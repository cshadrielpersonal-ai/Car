<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D Endless Drive - High Performance</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none; 
      -webkit-touch-callout: none;
      user-select: none;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #05050a;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

  <div id="canvas-container"></div>

  <script>
    // --- 1. SETUP SCENE, CAMERA, & RENDERER ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x05050a, 0.02);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(4, 2.5, 7);

    // PERFORMANCE FIX: Explicitly request high-performance graphics card
    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    // MAX PERFORMANCE FIX: Force resolution downscale to 0.75 max to instantly kill lag
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 0.75));
    renderer.shadowMap.enabled = false; 
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = false; // Disabled damping to save frame execution time
    controls.maxPolarAngle = Math.PI / 2 - 0.05;
    controls.enableZoom = false; 

    // --- 2. LIGHTING LAYOUT ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    // --- 3. CREATE THE HIGHWAY SYSTEM ---
    const roadGeo = new THREE.PlaneGeometry(25, 300); // Shorter road length
    // PERFORMANCE FIX: MeshPhongMaterial uses much lighter processing math than Standard
    const roadMat = new THREE.MeshPhongMaterial({ color: 0x0c0c10, shininess: 10 });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    scene.add(road);

    const gridHelper = new THREE.GridHelper(300, 60, 0xffbb00, 0x111122);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    // --- 4. STRUCTURING THE LUXURY YELLOW SUPERCAR ---
    const car = new THREE.Group();
    scene.add(car);

    // PERFORMANCE FIX: Converted all textures to super lightweight Phong models
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0xffcc00, shininess: 80 }); 
    const accentMat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 30 }); 
    const glassMat = new THREE.MeshPhongMaterial({ color: 0x0a0f1d, shininess: 100, transparent: true, opacity: 0.8 });
    const wheelMat = new THREE.MeshPhongMaterial({ color: 0x121216, shininess: 5 });
    const rimMat = new THREE.MeshPhongMaterial({ color: 0x161616, shininess: 50 }); 

    // Chassis Base
    const baseGeo = new THREE.BoxGeometry(2.3, 0.3, 4.4);
    const base = new THREE.Mesh(baseGeo, bodyMat);
    base.position.y = 0.35;
    car.add(base);

    // Front Hood
    const hoodGeo = new THREE.BoxGeometry(2.2, 0.2, 1.2);
    const hood = new THREE.Mesh(hoodGeo, bodyMat);
    hood.position.set(0, 0.45, -1.5);
    car.add(hood);

    // Cabin
    const cabinGeo = new THREE.BoxGeometry(1.8, 0.45, 1.8);
    const cabin = new THREE.Mesh(cabinGeo, glassMat);
    cabin.position.set(0, 0.75, 0.1);
    car.add(cabin);

    // Roof scoop
    const roofGeo = new THREE.BoxGeometry(1.6, 0.08, 1.4);
    const roof = new THREE.Mesh(roofGeo, bodyMat);
    roof.position.set(0, 0.98, 0.1);
    car.add(roof);

    // Side Skirts
    const skirtGeo = new THREE.BoxGeometry(0.15, 0.25, 2.4);
    const leftSkirt = new THREE.Mesh(skirtGeo, accentMat);
    leftSkirt.position.set(1.15, 0.35, 0);
    const rightSkirt = leftSkirt.clone();
    rightSkirt.position.x = -1.15;
    car.add(leftSkirt, rightSkirt);

    // Spoiler Struts
    const wingStrutGeo = new THREE.BoxGeometry(0.1, 0.4, 0.2);
    const leftStrut = new THREE.Mesh(wingStrutGeo, accentMat);
    leftStrut.position.set(0.8, 0.65, 2.0);
    const rightStrut = leftStrut.clone();
    rightStrut.position.x = -0.8;
    car.add(leftStrut, rightStrut);

    // Spoiler Blade
    const wingBladeGeo = new THREE.BoxGeometry(2.5, 0.06, 0.5);
    const wingBlade = new THREE.Mesh(wingBladeGeo, bodyMat);
    wingBlade.position.set(0, 0.85, 2.0);
    car.add(wingBlade);

    // White Headlamps
    const laserLightGeo = new THREE.BoxGeometry(0.5, 0.05, 0.05);
    const laserMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const leftLaser = new THREE.Mesh(laserLightGeo, laserMat);
    leftLaser.position.set(0.7, 0.45, -2.11);
    const rightLaser = leftLaser.clone();
    rightLaser.position.x = -0.7;
    car.add(leftLaser, rightLaser);

    // Red Tail Accents
    const tailGeo = new THREE.BoxGeometry(1.8, 0.06, 0.05);
    const tailMat = new THREE.MeshBasicMaterial({ color: 0xff1100 });
    const tailLight = new THREE.Mesh(tailGeo, tailMat);
    tailLight.position.set(0, 0.45, 2.21);
    car.add(tailLight);

    // Wheels setup (Minimal 8-sided geometry for speed)
    const wheels = [];
    const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.45, 8); // Dropped segments to 8 for maximum speed
    wheelGeo.rotateZ(Math.PI / 2);
    
    function createSportsWheel(x, y, z) {
      const tire = new THREE.Mesh(wheelGeo, wheelMat);
      tire.position.set(x, y, z);
      car.add(tire);
      wheels.push(tire);
    }

    createSportsWheel( 1.2, 0.45,  1.3); 
    createSportsWheel(-1.2, 0.45,  1.3); 
    createSportsWheel( 1.2, 0.45, -1.3); 
    createSportsWheel(-1.2, 0.45, -1.3); 

    car.rotation.y = Math.PI;

    // --- 5. REAL-TIME ANIMATION LOOP ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const time = clock.getElapsedTime();

      // Track movement math
      gridHelper.position.z -= 35 * delta; 
      if (gridHelper.position.z < -10) {
        gridHelper.position.z = 0;
      }

      // Wheel rotations
      for (let i = 0; i < wheels.length; i++) {
        wheels[i].rotation.x -= 20 * delta;
      }

      // Micro frame bounce
      car.position.y = Math.sin(time * 12) * 0.012;
      car.position.x = Math.sin(time * 1.5) * 0.08;

      renderer.render(scene, camera);
    }

    animate();

    // --- 6. WINDOW RESIZE HANDLING ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
